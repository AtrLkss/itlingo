<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
    <header class="site-header">
        <div class="site-header__container">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="IT-Lingo" class="site-header__logo">
            <span>IT-Lingo</span>
            <nav class="site-header__nav">
                <ul>
                    {% if current_user.is_authenticated %}
                    <li><a href="/personal_account" class="site-header__link">Личный кабинет</a></li>
                    <li><a href="/logout" class="site-header__link">Выйти</a></li>
                    {% else %}
                    <li><a href="/login" class="site-header__link">Войти</a></li>
                    <li><a href="/register" class="site-header__link">Зарегистрироваться</a></li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>
