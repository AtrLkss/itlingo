<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
    <div class="container mt-10">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4"> <a href="/"
                class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"> <svg
                    class="bi me-2" width="0" height="0" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg> <span class="fs-4">IT-Lingo</span> </a>
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="/login" class="nav-link login">Войти</a></li>
                <li class="nav-item"><a href="/register" class="nav-link active"
                        aria-current="page">Зарегистрироваться</a></li>
            </ul>
        </header>
    </div>
    {% block body %} {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
