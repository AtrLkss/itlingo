<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{url_for('static', filename='dashboard.css')}}">
    <title>{% block title %}Курс первый{% endblock %}</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container mt-10">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4"> <a href="/dashboard"
                class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"> <svg
                    class="bi me-2" width="0" height="0" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg> <span class="fs-4 font">IT-Lingo</span> </a>
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="/personal_account" class="nav-link active font">Личный кабинет</a></li>
                <li class="nav-item"><a href="/logout" class="nav-link login" aria-current="page font">Выйти</a></li>
            </ul>
        </header>
    </div>

    {% block body %}
    <main class="dashboard">
        <h1 class="dashboard__title font">Вступление</h1>
    </main>

    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
